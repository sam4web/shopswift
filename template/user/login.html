{% extends 'auth-base.html' %}
{% load static %}
{% block title %} Login {% endblock title %}

{% block content %}
<section class="w-full h-full flex justify-center items-center px-3">
    <div class="max-w-lg w-full shadow-lg rounded-lg px-4 sm:px-5 py-7 md:p-8 space-y-6 md:space-y-8 bg-white">
        <h2 class="text-4xl text-gray-dark font-medium transition text-center">
            Login
        </h2>

        <div>
            <label for="email" class="auth-input-label"> Email </label>
            <input class="auth-input-field" type="email" name="email" id="email" />
        </div>

        <div>
            <label for="password" class="auth-input-label"> Password </label>
            <input class="auth-input-field" type="password" name="password" id="password" />
        </div>

        <button class="btn-primary w-full">Login</button>

        <p class="text-center text-secondary-dark">
            Not a member yet?
            <a href="./register.html" class="text-primary font-medium">
                Register
            </a>
        </p>
    </div>
</section>
{% endblock content %}
