{% extends 'base.html' %}
{% load static %}
{% block title %} Username {% endblock title %}

{% block content %}
<div class="wrapper">
    <div class="md:grid grid-cols-3 items-start space-y-6 space-x-0 md:space-x-6">
        <aside class="col-span-1 space-y-5">
            <div class="px-3 py-5 lg:px-5 lg:py-7 bg-light dark:bg-primary-dark transition rounded-xl">
                <div class="flex justify-between items-start flex-wrap gap-5 md:gap-7 mb-5">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor"
                        class="w-16 h-16 border-2 border-gray text-gray rounded-full p-2 dark:text-light dark:border-light">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>

                    <div class="space-y-1">
                        <h3 class="text-2xl dark:text-light text-gray font-medium transition">
                            John Doe
                        </h3>
                        <p class="text-gray-dark text-base dark:text-white transition">
                            johndoe@gmail.com
                        </p>
                        <p class="text-gray text-base dark:text-white transition">
                            Member Since: 2020/09/12
                        </p>
                    </div>
                </div>

                <button
                    class="text-base text-secondary-dark dark:text-light bg-transparent border-2 border-red-600 px-5 py-2.5 rounded-md transition">
                    Logout
                </button>
            </div>

            <div>
                <form action=""
                    class="col-span-1 px-3 py-5 lg:px-5 lg:py-7 bg-light dark:bg-primary-dark transition rounded-xl space-y-3 sm:space-y-7">
                    <div
                        class="md:space-y-7 grid grid-cols-1 sm:grid-cols-3 gap-3 md:block justify-between items-center">
                        <div>
                            <label for="product" class="input-label">
                                Search Product
                            </label>
                            <input class="input-field-sm" type="text" name="product" id="product" />
                        </div>

                        <div>
                            <label for="category" class="input-label">
                                Select Category
                            </label>
                            <select name="category" id="category" class="input-field-sm">
                                <option value="all" selected class="capitalize">
                                    all
                                </option>
                            </select>
                        </div>

                        <div>
                            <label for="sort" class="input-label"> Sort By </label>
                            <select name="sort" id="sort" class="input-field-sm">
                                <option value="low" selected>Price (Lowest)</option>
                                <option value="high">Price (Highest)</option>
                                <option value="order">Name (A - Z)</option>
                                <option value="reverse-order">Name (Z - A)</option>
                            </select>
                        </div>
                    </div>

                    <div class="md:space-y-7 flex-col sm:flex-row flex justify-between sm:items-center gap-3 md:block">
                        <div class="flex-1">
                            <label for="min" class="input-label"> Price Range </label>
                            <div class="flex gap-3 items-center">
                                <input class="input-field-sm" type="number" name="product" id="product"
                                    placeholder="Min" min="0" />
                                -
                                <input class="input-field-sm" type="number" name="product" id="product"
                                    placeholder="Max" min="0" />
                            </div>
                        </div>

                        <div class="flex flex-1 sm:justify-center md:justify-start items-center gap-3">
                            <label for="free-shipping" class="inline-block text-gray-dark text-base dark:text-white">
                                Free Shipping
                            </label>
                            <input type="checkbox" name="free-shipping" class="w-[15px] h-[15px]" id="free-shipping" />
                        </div>
                    </div>

                    <div class="flex gap-2.5">
                        <button type="submit"
                            class="w-full text-base text-light bg-primary px-3 py-2 rounded-md border-primary transition">
                            Submit
                        </button>
                        <button type="reset"
                            class="w-full text-base text-light bg-red-600 px-3 py-2 rounded-md border-primary transition">
                            Reset
                        </button>
                    </div>
                </form>
            </div>
        </aside>

        <section class="col-span-2">
            <div class="flex justify-between">
                <h3 class="text-2xl lg:text-3xl dark:text-light text-gray font-medium transition">
                    My Products
                </h3>
                <p class="text-lg text-gray dark:text-light">
                    Total products: 20
                </p>
            </div>
            <hr class="h-px my-4 bg-gray-200 border-0 dark:bg-gray-700" />

            <div class="space-y-6">
                <template x-for="i in 4">
                    <div
                        class="shadow-md rounded-lg p-5 space-y-4 sm:space-y-0 sm:space-x-7 text-center bg-white dark:bg-primary-dark flex-col sm:flex-row flex items-start">
                        <img x-bind:src="`./src/assets/product-0${i}.jpg`" class="rounded-md sm:w-2/5" alt="" />
                        <div class="space-y-3 text-left flex-1">
                            <div class="flex justify-between">
                                <h3 class="text-xl dark:text-light">
                                    Avant-Garde Lamp
                                </h3>
                                <p class="text-lg text-primary font-medium">$179.99</p>
                            </div>
                            <p class="text-gray dark:text-light">
                                Lorem ipsum dolor sit amet, consectetur adipisicing
                                elit. Totam tempore, minima explicabo veniam consequatur
                                molestiae libero assumenda, quas eos doloribus obcaecati
                                sit ipsa non.
                            </p>
                            <div class="flex gap-2">
                                <button class="text-base text-light bg-primary px-4 py-2 rounded-md transition">
                                    Detail
                                </button>
                                <button class="text-base text-light bg-emerald-600 px-4 py-2 rounded-md transition">
                                    Edit
                                </button>
                                <button class="text-base text-light bg-red-600 px-4 py-2 rounded-md transition">
                                    Remove
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>
    </div>
</div>
{% endblock content %}
