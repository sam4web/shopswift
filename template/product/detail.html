{% extends 'base.html' %}
{% load static %}
{% block title %} {{ product.name }} {% endblock title %}

{% block content %} <div class="wrapper">
    <section class="grid md:grid-cols-2 gap-5 md:gap-11">
        <img src="/media/{{ product.image }}" class="rounded-lg" alt="{{ product.name }} Image" />


        <div class="space-y-4 lg:space-y-6">
            <div class="space-y-1 lg:space-y-3">
                <h3 class="text-2xl lg:text-3xl dark:text-light text-gray font-medium transition">
                    {{ product.name }}
                </h3>
                <p class="text-lg lg:text-xl text-secondary-dark dark:text-light">
                    ${{ product.price }}
                </p>
            </div>

            <p class="font-normal text-base lg:text-lg dark:text-light pb-3">
                {{ product.description }}
            </p>

            {% if request.user == product.created_by %}
            <div class="space-x-2">
                <a href="{% url 'product:edit' product.id %}">
                    <button class="btn bg-emerald-600 border-emerald-600">
                        Edit
                    </button>
                </a>
                <a href="{% url 'product:delete' product.id %}">
                    <button class="btn bg-red-600 border-red-600">Delete</button>
                </a>
            </div>
            {% else %}
            <a href="{% url 'product:add_item' product.id %}" class="inline-block">
                <button class="btn-primary" type="submit">Add to Cart</button>
            </a>
            </form>
            {% endif %}
        </div>
    </section>
</div>
{% endblock content %}
