{% extends 'base.html' %}
{% load static %}
{% block title %} Shopping Cart {% endblock title %}

{% block content %}
<div class="wrapper">
  <section>
    <h3 class="text-2xl lg:text-3xl dark:text-light text-gray font-medium transition">
      Shopping Cart
    </h3>
  </section>
  <hr class="h-px my-4 bg-gray-200 border-0 dark:bg-gray-700" />

  <section class="md:grid grid-cols-4 md:gap-7 space-y-10 md:space-y-0 mt-6">
    <aside class="col-span-2 lg:col-span-1">
      <div class="px-3 py-5 lg:p-5 bg-light dark:bg-primary-dark transition rounded-xl space-y-3 mb-4">
        <div class="border-b pb-1.5 flex justify-between">
          <p class="text-gray dark:text-light">Subtotal</p>
          <p class="text-gray-dark dark:text-light">$339.99</p>
        </div>
        <div class="border-b pb-1.5 flex justify-between">
          <p class="text-gray dark:text-light">Shipping</p>
          <p class="text-gray-dark dark:text-light">$5.00</p>
        </div>
        <div class="border-b pb-1.5 flex justify-between">
          <p class="text-gray dark:text-light">Tax</p>
          <p class="text-gray-dark dark:text-light">$34.00</p>
        </div>

        <div class="flex justify-between">
          <p class="w-full text-gray text-lg font-medium dark:text-light">
            Order Total
          </p>
          <p class="text-gray-dark dark:text-light">$400.00</p>
        </div>
      </div>

      <a href="./checkout.html">
        <button class="btn-primary w-full">Proceed to Checkout</button>
      </a>
    </aside>

    <div class="flex flex-wrap md:flex-col gap-6 col-span-2 lg:col-span-3">
      <template x-for="i in 4" x-data>
        <div
          class="shadow-md rounded-lg p-5 space-y-3 lg:space-y-0 lg:space-x-7 text-center bg-white dark:bg-primary-dark flex-col lg:flex-row flex items-start">
          <img x-bind:src="`./src/assets/product-0${i}.jpg`" class="rounded-md lg:w-1/3" alt="" />
          <div class="text-left flex-1 space-y-2 md:space-y-5">
            <div class="lg:flex justify-between">
              <h3 class="text-xl dark:text-light">Avant-Garde Lamp</h3>
              <p class="text-lg text-primary font-medium">$179.99</p>
            </div>
            <p class="text-gray dark:text-light">Quantity: 2</p>
            <div class="space-x-2">
              <button class="text-base text-light bg-primary px-3 py-1.5 rounded-md border-primary transition">
                Detail
              </button>
              <button class="text-base text-light bg-red-600 px-3 py-1.5 rounded-md border-primary transition">
                Remove
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </section>
</div>
{% endblock content %}
