<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/main.min.css" />
    <title>Login | ShopSwift</title>
  </head>
  <body>
    <div class="flex flex-col w-full h-screen">
      <main class="transition py-1 flex-1">
        <section class="w-full h-full flex justify-center items-center px-3">
          <div
            class="max-w-lg w-full shadow-lg rounded-lg px-4 sm:px-5 py-7 md:p-8 space-y-6 md:space-y-8 bg-white"
          >
            <h2
              class="text-4xl text-gray-dark font-medium transition text-center"
            >
              Login
            </h2>

            <div>
              <label for="email" class="auth-input-label"> Email </label>
              <input
                class="auth-input-field"
                type="email"
                name="email"
                id="email"
              />
            </div>

            <div>
              <label for="password" class="auth-input-label"> Password </label>
              <input
                class="auth-input-field"
                type="password"
                name="password"
                id="password"
              />
            </div>

            <button class="btn-primary w-full">Login</button>

            <p class="text-center text-secondary-dark">
              Not a member yet?
              <a href="./register.html" class="text-primary font-medium">
                Register
              </a>
            </p>
          </div>
        </section>
      </main>
    </div>

    <script src="./src/js/component.js"></script>
    <script src="./src/js/script.js"></script>
  </body>
</html>
