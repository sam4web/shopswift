<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/main.min.css" />
    <title>Checkout | ShopSwift</title>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <div class="flex flex-col w-full h-screen">
      <app-header></app-header>
      <main class="transition-all dark:bg-body-dark py-1 flex-1">
        <div class="wrapper">
          <section>
            <h3
              class="text-2xl lg:text-3xl dark:text-light text-gray font-medium transition"
            >
              Place Your Order
            </h3>
            <hr class="h-px my-4 bg-gray-200 border-0 dark:bg-gray-700" />
          </section>

          <section
            class="md:grid grid-cols-4 md:gap-7 space-y-10 md:space-y-0 mt-6"
          >
            <aside class="col-span-2">
              <form action="" class="space-y-3">
                <h4
                  class="text-xl dark:text-light text-gray font-medium transition pb-1"
                >
                  Shipping Information
                </h4>

                <div>
                  <label for="first-name" class="input-label">
                    First Name
                  </label>
                  <input
                    class="input-field-lg"
                    type="text"
                    name="first-name"
                    id="first-name"
                  />
                </div>

                <div class="pb-1.5">
                  <label for="address" class="input-label"> Address </label>
                  <input
                    class="input-field-lg"
                    type="text"
                    name="address"
                    id="address"
                  />
                </div>

                <button class="btn-primary w-full">Place Your Order</button>
              </form>
            </aside>

            <aside class="col-span-2">
              <div
                class="px-3 py-5 lg:p-5 bg-light dark:bg-primary-dark transition rounded-xl space-y-4 mb-4"
              >
                <div class="border-b pb-1.5 flex justify-between">
                  <p class="text-gray dark:text-light">Subtotal</p>
                  <p class="text-gray-dark dark:text-light">$339.99</p>
                </div>
                <div class="border-b pb-1.5 flex justify-between">
                  <p class="text-gray dark:text-light">Shipping</p>
                  <p class="text-gray-dark dark:text-light">$5.00</p>
                </div>
                <div class="border-b pb-1.5 flex justify-between">
                  <p class="text-gray dark:text-light">Tax</p>
                  <p class="text-gray-dark dark:text-light">$34.00</p>
                </div>

                <div class="flex justify-between">
                  <p
                    class="w-full text-gray text-lg font-medium dark:text-light"
                  >
                    Order Total
                  </p>
                  <p class="text-gray-dark dark:text-light font-medium">
                    $400.00
                  </p>
                </div>
              </div>
            </aside>
          </section>
        </div>
      </main>
      <app-footer></app-footer>
    </div>

    <script src="./src/js/component.js"></script>
    <script src="./src/js/script.js"></script>
  </body>
</html>
