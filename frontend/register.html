<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/main.min.css" />
    <title>Register | ShopSwift</title>
  </head>
  <body>
    <div class="flex flex-col w-full h-screen">
      <main class="transition-all py-1 flex-1">
        <section class="w-full h-full flex justify-center items-center px-3">
          <div
            class="max-w-lg w-full shadow-lg rounded-lg px-4 sm:px-5 py-7 md:p-8 space-y-6 md:space-y-8 bg-white"
          >
            <h2
              class="text-4xl text-gray-dark font-medium transition text-center"
            >
              Register
            </h2>

            <div class="space-y-4 md:space-y-6">
              <div>
                <label
                  for="username"
                  class="mb-1 inline-block text-gray-dark text-base"
                >
                  Username
                </label>
                <input
                  class="w-full border-2 border-gray-dark outline-none px-4 py-3 rounded-md"
                  type="text"
                  name="username"
                  id="username"
                />
              </div>

              <div>
                <label
                  for="email"
                  class="mb-1 inline-block text-gray-dark text-base"
                >
                  Email
                </label>
                <input
                  class="w-full border-2 border-gray-dark outline-none px-4 py-3 rounded-md"
                  type="email"
                  name="email"
                  id="email"
                />
              </div>

              <div>
                <label
                  for="password1"
                  class="mb-1 inline-block text-gray-dark text-base"
                >
                  Password
                </label>
                <input
                  class="w-full border-2 border-gray-dark outline-none px-4 py-3 rounded-md"
                  type="password"
                  name="password1"
                  id="password1"
                />
              </div>

              <div>
                <label
                  for="password2"
                  class="mb-1 inline-block text-gray-dark text-base"
                >
                  Retype Password
                </label>
                <input
                  class="w-full border-2 border-gray-dark outline-none px-4 py-3 rounded-md"
                  type="password"
                  name="password2"
                  id="password2"
                />
              </div>
            </div>

            <button class="btn-primary w-full">Register</button>

            <p class="text-center text-primary-dark">
              Already a member?
              <a href="./register.html" class="text-primary font-medium">
                Login
              </a>
            </p>
          </div>
        </section>
      </main>
    </div>

    <script src="./src/js/component.js"></script>
    <script src="./src/js/script.js"></script>
  </body>
</html>
