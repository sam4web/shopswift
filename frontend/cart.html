<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/main.min.css" />
    <title>Cart | ShopSwift</title>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <div class="flex flex-col w-full h-screen">
      <app-header></app-header>
      <main class="transition-all dark:bg-body-dark py-1 flex-1">
        <div class="wrapper">
          <section>
            <h3
              class="text-3xl dark:text-light text-gray font-medium transition"
            >
              Shopping Cart
            </h3>
            <hr class="h-px my-4 bg-gray-200 border-0 dark:bg-gray-700" />
          </section>

          <section class="md:grid grid-cols-4 md:gap-7 space-y-10 md:space-y-0">
            <aside class="col-span-2 lg:col-span-1">
              <div
                class="px-3 py-5 lg:p-5 bg-light dark:bg-primary-dark transition rounded-md space-y-3 mb-4"
              >
                <div class="border-b pb-1.5 flex justify-between">
                  <p class="text-gray dark:text-light">Subtotal</p>
                  <p class="text-gray-dark dark:text-light">$339.99</p>
                </div>
                <div class="border-b pb-1.5 flex justify-between">
                  <p class="text-gray dark:text-light">Shipping</p>
                  <p class="text-gray-dark dark:text-light">$5.00</p>
                </div>
                <div class="border-b pb-1.5 flex justify-between">
                  <p class="text-gray dark:text-light">Tax</p>
                  <p class="text-gray-dark dark:text-light">$34.00</p>
                </div>

                <div class="flex justify-between">
                  <p
                    class="w-full text-gray text-lg font-medium dark:text-light"
                  >
                    Order Total
                  </p>
                  <p class="text-gray-dark dark:text-light">$400.00</p>
                </div>
              </div>

              <button class="btn-primary w-full">Proceed to Checkout</button>
            </aside>

            <div
              class="flex flex-wrap md:flex-col gap-6 col-span-2 lg:col-span-3"
            >
              <template x-for="i in 4" x-data>
                <div
                  class="shadow-md rounded-lg p-5 space-y-3 lg:space-y-0 lg:space-x-7 text-center bg-white dark:bg-primary-dark flex-col lg:flex-row flex items-start"
                >
                  <img
                    x-bind:src="`./src/assets/product-0${i}.jpg`"
                    class="rounded-md lg:w-1/3"
                    alt=""
                  />
                  <div class="text-left flex-1 space-y-2 md:space-y-5">
                    <div class="lg:flex justify-between">
                      <h3 class="text-xl dark:text-light">Avant-Garde Lamp</h3>
                      <p class="text-lg text-primary font-medium">$179.99</p>
                    </div>
                    <p class="text-gray dark:text-light">Quantity: 2</p>
                    <div class="space-x-2">
                      <button
                        class="text-base text-light bg-primary px-3 py-1.5 rounded-md border-primary transition"
                      >
                        Detail
                      </button>
                      <button
                        class="text-base text-light bg-red-600 px-3 py-1.5 rounded-md border-primary transition"
                      >
                        Remove
                      </button>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </section>
        </div>
      </main>
      <app-footer></app-footer>
    </div>

    <script src="./src/js/component.js"></script>
    <script src="./src/js/script.js"></script>
  </body>
</html>
