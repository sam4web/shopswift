<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/main.min.css" />
    <title>User | ShopSwift</title>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body
    x-data="{ darkMode: localStorage.getItem('dark') === 'true'} "
    x-init="$watch('darkMode', val => localStorage.setItem('dark', val))"
    x-bind:class="{ 'dark': darkMode }"
  >
    <div class="flex flex-col w-full h-screen">
      <header
        class="dark:bg-body-dark transition"
        x-data="{navbarToggle: false}"
      >
        <nav class="bg-secondary-dark dark:bg-gray-dark transition">
          <div class="max-w-7xl w-full mx-auto px-4 lg:px-10 py-1.5">
            <ul
              class="text-light flex justify-center items-center sm:justify-end space-x-6 text-sm md:text-[16px] font-light"
            >
              <!-- 
              <li>
              <a href="./login.html" class="hover:underline">Sign in</a>
              </li>
              <li>
              <a href="./register.html" class="hover:underline">Create Account</a>
              </li>
              
              -->
              <li>Hello, User</li>
              <li>
                <a>
                  <button
                    class="text-sm text-light px-3 py-1 rounded-md border-primary border-2 transition"
                  >
                    Logout
                  </button>
                </a>
              </li>
            </ul>
          </div>
        </nav>
        <nav class="bg-light dark:bg-primary-dark transition">
          <div class="max-w-7xl w-full mx-auto px-4 lg:px-10 py-4">
            <div class="flex justify-between items-center">
              <h3 class="md:block hidden">
                <a
                  href="./index.html"
                  class="text-3xl lg:text-[34px] font-bold font-heading dark:text-light"
                >
                  Shop<span class="text-primary">Swift</span>.
                </a>
              </h3>

              <ul class="hidden md:flex items-center">
                <li>
                  <a class="nav-link" href="./index.html"> Home </a>
                </li>
                <li>
                  <a class="nav-link" href="./about.html"> About </a>
                </li>
                <li>
                  <a class="nav-link" href="./products.html"> Products </a>
                </li>
                <li>
                  <a class="nav-link" href="./cart.html"> Cart </a>
                </li>

                <li>
                  <a class="nav-link" href="./checkout.html"> Checkout </a>
                </li>
                <li>
                  <a class="nav-link" href="./orders.html"> Orders </a>
                </li>
              </ul>

              <button
                class="block md:hidden"
                x-on:click="navbarToggle=!navbarToggle"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="w-7 h-7 dark:text-light"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12"
                  />
                </svg>
              </button>

              <div class="flex items-center gap-3.5">
                <button @click="darkMode = !darkMode">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-6 h-6 block dark:hidden"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
                    />
                  </svg>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-6 h-6 hidden dark:block text-light"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
                    />
                  </svg>
                </button>
                <a href="">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-6 h-6 dark:text-light"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
                    />
                  </svg>
                </a>
                <a href="">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-[26px] h-[26px] dark:text-light"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                    />
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </nav>

        <nav
          x-bind:class="!navbarToggle && 'hidden'"
          class="bg-light dark:bg-primary-dark mt-2 max-w-[240px] mx-auto sm:ml-8 p-2 rounded-md md:hidden transition"
        >
          <ul class="space-y-2.5">
            <li>
              <a class="nav-link" href="./index.html"> Home </a>
            </li>
            <li>
              <a class="nav-link" href="./about.html"> About </a>
            </li>
            <li>
              <a class="nav-link" href="./products.html"> Products </a>
            </li>
            <li>
              <a class="nav-link" href="./cart.html"> Cart </a>
            </li>
          </ul>
        </nav>
      </header>

      <main class="transition-all dark:bg-body-dark py-1 flex-1">
        <div class="wrapper">
          <div
            class="md:grid grid-cols-3 items-start space-y-6 space-x-0 md:space-x-6"
          >
            <aside class="col-span-1 space-y-5">
              <div
                class="px-3 py-5 lg:px-5 lg:py-7 bg-light dark:bg-primary-dark transition rounded-xl"
              >
                <div
                  class="flex justify-between items-start flex-wrap gap-5 md:gap-7 mb-5"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-16 h-16 border-2 border-gray text-gray rounded-full p-2 dark:text-light dark:border-light"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
                    />
                  </svg>

                  <div class="space-y-1">
                    <h3
                      class="text-2xl dark:text-light text-gray font-medium transition"
                    >
                      John Doe
                    </h3>
                    <p
                      class="text-gray-dark text-base dark:text-white transition"
                    >
                      johndoe@gmail.com
                    </p>
                    <p class="text-gray text-base dark:text-white transition">
                      Member Since: 2020/09/12
                    </p>
                  </div>
                </div>

                <button
                  class="text-base text-secondary-dark dark:text-light bg-transparent border-2 border-red-600 px-5 py-2.5 rounded-md transition"
                >
                  Logout
                </button>
              </div>

              <div>
                <form
                  action=""
                  class="col-span-1 px-3 py-5 lg:px-5 lg:py-7 bg-light dark:bg-primary-dark transition rounded-xl space-y-3 sm:space-y-7"
                >
                  <div
                    class="md:space-y-7 grid grid-cols-1 sm:grid-cols-3 gap-3 md:block justify-between items-center"
                  >
                    <div>
                      <label for="product" class="input-label">
                        Search Product
                      </label>
                      <input
                        class="input-field-sm"
                        type="text"
                        name="product"
                        id="product"
                      />
                    </div>

                    <div>
                      <label for="category" class="input-label">
                        Select Category
                      </label>
                      <select
                        name="category"
                        id="category"
                        class="input-field-sm"
                      >
                        <option value="all" selected class="capitalize">
                          all
                        </option>
                      </select>
                    </div>

                    <div>
                      <label for="sort" class="input-label"> Sort By </label>
                      <select name="sort" id="sort" class="input-field-sm">
                        <option value="low" selected>Price (Lowest)</option>
                        <option value="high">Price (Highest)</option>
                        <option value="order">Name (A - Z)</option>
                        <option value="reverse-order">Name (Z - A)</option>
                      </select>
                    </div>
                  </div>

                  <div
                    class="md:space-y-7 flex-col sm:flex-row flex justify-between sm:items-center gap-3 md:block"
                  >
                    <div class="flex-1">
                      <label for="min" class="input-label"> Price Range </label>
                      <div class="flex gap-3 items-center">
                        <input
                          class="input-field-sm"
                          type="number"
                          name="product"
                          id="product"
                          placeholder="Min"
                          min="0"
                        />
                        -
                        <input
                          class="input-field-sm"
                          type="number"
                          name="product"
                          id="product"
                          placeholder="Max"
                          min="0"
                        />
                      </div>
                    </div>

                    <div
                      class="flex flex-1 sm:justify-center md:justify-start items-center gap-3"
                    >
                      <label
                        for="free-shipping"
                        class="inline-block text-gray-dark text-base dark:text-white"
                      >
                        Free Shipping
                      </label>
                      <input
                        type="checkbox"
                        name="free-shipping"
                        class="w-[15px] h-[15px]"
                        id="free-shipping"
                      />
                    </div>
                  </div>

                  <div class="flex gap-2.5">
                    <button
                      type="submit"
                      class="w-full text-base text-light bg-primary px-3 py-2 rounded-md border-primary transition"
                    >
                      Submit
                    </button>
                    <button
                      type="reset"
                      class="w-full text-base text-light bg-red-600 px-3 py-2 rounded-md border-primary transition"
                    >
                      Reset
                    </button>
                  </div>
                </form>
              </div>
            </aside>

            <section class="col-span-2">
              <div class="flex justify-between">
                <h3
                  class="text-2xl lg:text-3xl dark:text-light text-gray font-medium transition"
                >
                  My Products
                </h3>
                <p class="text-lg text-gray dark:text-light">
                  Total products: 20
                </p>
              </div>
              <hr class="h-px my-4 bg-gray-200 border-0 dark:bg-gray-700" />

              <div class="space-y-6">
                <template x-for="i in 4">
                  <div
                    class="shadow-md rounded-lg p-5 space-y-4 sm:space-y-0 sm:space-x-7 text-center bg-white dark:bg-primary-dark flex-col sm:flex-row flex items-start"
                  >
                    <img
                      x-bind:src="`./src/assets/product-0${i}.jpg`"
                      class="rounded-md sm:w-2/5"
                      alt=""
                    />
                    <div class="space-y-3 text-left flex-1">
                      <div class="flex justify-between">
                        <h3 class="text-xl dark:text-light">
                          Avant-Garde Lamp
                        </h3>
                        <p class="text-lg text-primary font-medium">$179.99</p>
                      </div>
                      <p class="text-gray dark:text-light">
                        Lorem ipsum dolor sit amet, consectetur adipisicing
                        elit. Totam tempore, minima explicabo veniam consequatur
                        molestiae libero assumenda, quas eos doloribus obcaecati
                        sit ipsa non.
                      </p>
                      <div class="flex gap-2">
                        <button
                          class="text-base text-light bg-primary px-4 py-2 rounded-md transition"
                        >
                          Detail
                        </button>
                        <button
                          class="text-base text-light bg-emerald-600 px-4 py-2 rounded-md transition"
                        >
                          Edit
                        </button>
                        <button
                          class="text-base text-light bg-red-600 px-4 py-2 rounded-md transition"
                        >
                          Remove
                        </button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </section>
          </div>
        </div>
      </main>

      <app-footer></app-footer>
    </div>

    <script src="./src/js/component.js"></script>
    <script src="./src/js/script.js"></script>
  </body>
</html>
