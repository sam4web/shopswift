<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/main.min.css" />
    <title>Checkout | ShopSwift</title>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <div class="flex flex-col w-full h-screen">
      <app-header></app-header>
      <main class="transition-all dark:bg-body-dark py-1 flex-1">
        <div class="wrapper">
          <section class="flex justify-between">
            <h3
              class="text-2xl lg:text-3xl dark:text-light text-gray font-medium transition"
            >
              Your orders
            </h3>
            <p class="text-lg text-gray dark:text-light">Total orders: 20</p>
          </section>
          <hr class="h-px my-4 bg-gray-200 border-0 dark:bg-gray-700" />

          <section>
            <div class="relative overflow-x-auto rounded-lg">
              <table
                class="w-full text-base text-left text-gray-500 dark:text-gray-400"
              >
                <thead
                  class="text-base text-gray bg-gray-50 dark:text-light dark:bg-primary-dark"
                >
                  <tr>
                    <th scope="col" class="px-6 py-4 font-medium">Name</th>
                    <th scope="col" class="px-6 py-4 font-medium">Address</th>
                    <th scope="col" class="px-6 py-4 font-medium">Products</th>
                    <th scope="col" class="px-6 py-4 font-medium">Cost</th>
                    <th scope="col" class="px-6 py-4 font-medium">Date</th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    class="bg-white border-b dark:bg-gray-800 dark:border-gray-700"
                  >
                    <td class="px-6 py-4">Whimsy Walter</td>
                    <td class="px-6 py-4">Pun Lane, Hilarity Heights</td>
                    <td class="px-6 py-4">1</td>
                    <td class="px-6 py-4">$202.99</td>
                    <td class="px-6 py-4">Feb 5th, 2024</td>
                  </tr>
                  <tr
                    class="bg-white border-b dark:bg-gray-800 dark:border-gray-700"
                  >
                    <td class="px-6 py-4">Whimsy Walter</td>
                    <td class="px-6 py-4">Pun Lane, Hilarity Heights</td>
                    <td class="px-6 py-4">1</td>
                    <td class="px-6 py-4">$202.99</td>
                    <td class="px-6 py-4">Feb 5th, 2024</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
      <app-footer></app-footer>
    </div>

    <script src="./src/js/component.js"></script>
    <script src="./src/js/script.js"></script>
  </body>
</html>
