<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/main.min.css" />
    <title>Detail | ShopSwift</title>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <div class="flex flex-col w-full h-screen">
      <app-header></app-header>
      <main class="transition-all dark:bg-body-dark py-1 flex-1">
        <div class="wrapper">
          <section class="grid md:grid-cols-2 gap-5 md:gap-11">
            <img src="./src/assets/product-01.jpg" class="rounded-lg" alt="" />

            <div class="space-y-4 lg:space-y-6">
              <div class="space-y-1 lg:space-y-3">
                <h3
                  class="text-2xl lg:text-3xl dark:text-light text-gray font-medium transition"
                >
                  Avant-Grade Lamp
                </h3>
                <p
                  class="text-lg lg:text-xl text-secondary-dark dark:text-light"
                >
                  $179.99
                </p>
              </div>

              <p class="font-normal text-base lg:text-lg dark:text-light pb-3">
                Lorem ipsum dolor sit amet consectetur, adipisicing elit. Iusto
                totam eveniet fuga quae voluptas porro laborum temporibus odit
                quod culpa voluptatem nemo odio cumque ipsum ipsam est itaque,
                dolorem dolorum!
              </p>

              <div>
                <label for="quantity" class="input-label"> Quantity </label>
                <input
                  class="input-field-lg"
                  type="number"
                  name="quantity"
                  id="quantity"
                  value="1"
                />
              </div>

              <button class="btn-primary">Add to Bag</button>
            </div>
          </section>
        </div>
      </main>
      <app-footer></app-footer>
    </div>

    <script src="./src/js/component.js"></script>
    <script src="./src/js/script.js"></script>
  </body>
</html>
